name: mnscloud_phoneweb
description: Public standalone Flutter WebRTC softphone for SIP over secure WebSocket providers.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_contacts: ^2.0.2
  flutter_secure_storage: ^10.3.0
  flutter_webrtc: ^1.4.1
  go_router: ^16.2.2
  permission_handler: ^12.0.1
  sip_ua:
    path: third_party/sip_ua

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
